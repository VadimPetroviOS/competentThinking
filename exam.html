<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A1C">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Экзамен</title>
<style>
  :root {
    --void: #0A0A1C;
    --void-2: #150F30;
    --nebula: #3A2166;
    --panel: rgba(20, 16, 42, 0.6);
    --panel-solid: #171233;
    --line: rgba(255,255,255,.12);
    --ink: #F3F1FF;
    --muted: #A79FC9;
    --accent: #FFB454;
    --accent-ink: #3D2400;
    --good: #6FDFA6;
    --good-bg: rgba(111,223,166,.14);
    --bad: #FF6E7A;
    --bad-bg: rgba(255,110,122,.16);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    background: var(--void);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }
  #stars { position: fixed; inset: 0; z-index: 0; display: block; }
  .nebula {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(38% 30% at 18% 22%, rgba(122,90,220,.35), transparent 60%),
      radial-gradient(45% 35% at 82% 78%, rgba(255,140,90,.14), transparent 60%),
      radial-gradient(30% 25% at 75% 15%, rgba(90,170,220,.20), transparent 60%),
      linear-gradient(180deg, var(--void) 0%, var(--void-2) 55%, var(--void) 100%);
    filter: blur(2px);
  }
  .stage {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 28px 16px;
  }
  .panel {
    width: 100%; max-width: 460px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 22px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 30px 60px -25px rgba(0,0,0,.7);
    padding: 26px 22px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  h1.title {
    font-family: "Century Gothic", "Futura", "Trebuchet MS", ui-sans-serif, sans-serif;
    text-align: center; text-transform: uppercase; letter-spacing: .04em;
    font-size: 18px; margin: 0 0 4px; color: var(--ink);
  }
  h1.title span { color: var(--accent); }
  .subtitle { text-align: center; font-size: 12px; color: var(--muted); margin: -8px 0 4px; }

  .cta {
    font: inherit; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    font-size: 15px; color: var(--accent-ink);
    background: linear-gradient(180deg, #FFD98E, var(--accent));
    border: none; border-radius: 14px; padding: 15px 18px; cursor: pointer;
    box-shadow: 0 10px 24px -10px rgba(255,180,84,.6), 0 1px 0 rgba(255,255,255,.4) inset;
    transition: transform .1s ease, box-shadow .1s ease;
  }
  .cta:hover { transform: translateY(-1px); }
  .cta:active { transform: translateY(0px) scale(.99); }
  .cta.secondary {
    background: rgba(255,255,255,.06); color: var(--ink); box-shadow: none;
    border: 1px solid var(--line); text-decoration: none; text-align: center; display: block;
  }
  .cta.danger { background: var(--bad-bg); color: var(--bad); box-shadow: none; border: 1px solid var(--bad); }

  .hud { display: flex; justify-content: space-between; align-items: flex-end; }
  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-block.right { align-items: flex-end; }
  .hud-label { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .hud-value {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .hud-value.timer-warn { color: var(--bad); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

  .topic-badge {
    text-align: center; font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin: 0;
  }
  .question {
    text-align: center; font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: 26px; font-weight: 600; color: var(--ink); line-height: 1.5; margin: 4px 0;
  }
  .question.prose {
    text-align: left; font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 15px; font-weight: 500; line-height: 1.55;
  }
  .choice-row { display: flex; flex-direction: column; gap: 10px; }

  .readout {
    position: relative;
    background: rgba(0,0,0,.35); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 16px; text-align: center;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .readout input {
    width: 100%; background: transparent; border: none; outline: none;
    font-family: inherit; font-size: 22px; font-weight: 600; color: var(--ink);
    text-align: center;
  }
  .readout input::placeholder { color: var(--muted); }
  .readout.flash-good { border-color: var(--good); box-shadow: 0 0 0 3px var(--good-bg); }
  .readout.flash-bad { border-color: var(--bad); box-shadow: 0 0 0 3px var(--bad-bg); }
  .cta.secondary.flash-good { border-color: var(--good); background: var(--good-bg); color: var(--good); }
  .cta.secondary.flash-bad { border-color: var(--bad); background: var(--bad-bg); color: var(--bad); }

  .hint { text-align: center; font-size: 11px; color: var(--muted); margin: 0; }

  .feedback {
    min-height: 20px; text-align: center; font-size: 13.5px; font-weight: 700; letter-spacing: .02em;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  .keypad-extra { display: flex; gap: 8px; }
  .keypad-extra button {
    flex: 1; font-family: ui-monospace, "SF Mono", monospace; font-size: 16px; font-weight: 600;
    color: var(--muted); background: rgba(255,255,255,.04); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 0; cursor: pointer;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .keypad-extra button:hover { background: rgba(255,255,255,.09); color: var(--ink); }
  .keypad-extra button:active { transform: scale(.96); }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .keypad button {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 19px; font-weight: 600;
    color: var(--ink); background: rgba(255,255,255,.05); border: 1px solid var(--line);
    border-radius: 12px; padding: 13px 0; cursor: pointer;
    transition: background .1s ease, transform .05s ease;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .keypad button:hover { background: rgba(255,255,255,.1); }
  .keypad button:active { transform: scale(.96); }

  .end-badge {
    width: 60px; height: 60px; margin: 4px auto 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 24px; font-weight: 700;
  }
  .end-badge.win { background: var(--good-bg); color: var(--good); box-shadow: 0 0 0 8px rgba(111,223,166,.06); }
  .end-badge.lose { background: rgba(255,255,255,.06); color: var(--accent); box-shadow: 0 0 0 8px rgba(255,180,84,.06); }
  .end-title {
    text-align: center; font-family: "Century Gothic","Futura","Trebuchet MS",ui-sans-serif,sans-serif;
    text-transform: uppercase; letter-spacing: .03em; font-size: 20px; font-weight: 700; margin: 0;
  }
  .end-sub { text-align: center; color: var(--muted); font-size: 13px; margin: -4px 0 0; line-height: 1.5; }
  .stat-row { display: flex; justify-content: space-around; padding-top: 4px; }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .stat-value { font-family: ui-monospace, monospace; font-size: 20px; font-weight: 700; color: var(--ink); }

  /* --- settings-specific --- */
  .op-grid, .topic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (max-width: 380px) { .op-grid, .topic-grid { grid-template-columns: 1fr; } }
  .chip {
    display: flex; align-items: center; gap: 8px; padding: 11px 12px;
    border: 1px solid var(--line); border-radius: 12px; cursor: pointer; font-size: 13px;
    color: var(--ink); background: rgba(255,255,255,.03);
    user-select: none; transition: border-color .1s ease, background .1s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.checked { border-color: var(--accent); background: rgba(255,180,84,.1); }
  .chip input { accent-color: var(--accent); width: 15px; height: 15px; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .range-ticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .settings-label { font-size: 12.5px; font-weight: 700; color: var(--ink); letter-spacing: .02em; }
  .settings-error { color: var(--bad); font-size: 12px; text-align: center; min-height: 16px; }
  .preview-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .preview-chip {
    font-family: ui-monospace, monospace; font-size: 13.5px; font-weight: 600; color: var(--ink);
    background: rgba(0,0,0,.3); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
  }
  .back-link { text-align: center; font-size: 11.5px; color: var(--muted); text-decoration: none; display: block; }
  .back-link:hover { color: var(--ink); }
</style>
</head>
<body>
<canvas id="stars"></canvas><div class="nebula"></div>
<div class="stage">
  <div class="panel" id="trainingView" style="display:none;">
    <div class="hud">
      <div class="hud-block">
        <div class="hud-label">Время</div>
        <div class="hud-value" id="timerVal">10:00</div>
      </div>
      <div class="hud-block right">
        <div class="hud-label">Верно</div>
        <div class="hud-value" id="scoreVal">0/0</div>
      </div>
    </div>

    <p class="topic-badge">Экзамен · все темы</p>
    <div class="question" id="questionEl">—</div>

    <div id="choiceControls" class="choice-row" style="display:none;"></div>

    <div id="textControls">
      <div class="readout" id="readout">
        <input type="text" id="answerInput" placeholder="ответ" autocomplete="off" inputmode="decimal">
      </div>
      <p class="hint" id="hintEl"></p>
      <div class="keypad-extra" id="keypadExtra" style="margin-top:10px;"></div>
      <div class="keypad" id="keypad" style="margin-top:8px;">
        <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
        <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
        <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
        <button data-k=".">.</button><button data-k="0">0</button><button data-k="back">⌫</button>
      </div>
      <button class="cta" id="checkBtn" style="width:100%; margin-top:16px;">Проверить</button>
    </div>

    <button class="cta danger" id="exitBtn">Завершить</button>
  </div>

  <div class="panel" id="resultsView" style="display:none; text-align:center;">
    <div class="end-badge" id="endBadge">★</div>
    <h1 class="title" id="endTitle">Готово</h1>
    <p class="end-sub" id="endSub">—</p>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">Счёт</div>
        <div class="stat-value" id="resultBig">0/0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Точность</div>
        <div class="stat-value" id="resultAcc" style="font-size:14px;">0%</div>
      </div>
    </div>
    <button class="cta" id="retryBtn" style="margin-top:6px;">Пройти ещё раз</button>
    <a class="back-link" href="math.html" style="margin-top:8px;">Вернуться к темам</a>
  </div>
</div>

<script>

function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b, a%b]; } return a || 1; }
function isPrime(n){ if(n<2) return false; for(let i=2;i*i<=n;i++){ if(n%i===0) return false; } return true; }
function primeFactorize(n){ const f=[]; let num=n,d=2; while(d*d<=num){ while(num%d===0){ f.push(d); num/=d; } d++; } if(num>1) f.push(num); return f; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function reduceFrac(num,den){ if(den<0){num=-num;den=-den;} const g=gcd(num,den); return {n:num/g, d:den/g}; }
function parseFracInput(raw){
  const s = raw.trim().replace(/\s+/g,'');
  const m = s.match(/^(-?\d+)(?:\/(\d+))?$/);
  if(!m) return null;
  const num = parseInt(m[1],10); const den = m[2] ? parseInt(m[2],10) : 1;
  if(den===0) return null;
  return reduceFrac(num, den);
}
function fracHTML(num, den, negative){
  const sign = negative ? '&minus;&nbsp;' : '';
  if(den === 1) return `${sign}${num}`;
  return `${sign}${num}/${den}`;
}
function parseTrigAnswer(raw){
  const s = raw.trim().toLowerCase().replace(/\s+/g,'').replace(',', '.');
  if(!s) return null;
  let m;
  if((m = s.match(/^-?\d+(\.\d+)?$/))) return parseFloat(s);
  if((m = s.match(/^(-?)(\d+)\/(\d+)$/))) return (m[1]==='-'?-1:1) * parseInt(m[2],10)/parseInt(m[3],10);
  if((m = s.match(/^(-?)(?:√|sqrt)\(?(\d+)\)?(?:\/(\d+))?$/))){
    const sign = m[1]==='-' ? -1 : 1;
    const val = Math.sqrt(parseInt(m[2],10));
    const den = m[3] ? parseInt(m[3],10) : 1;
    return sign*val/den;
  }
  return null;
}
const PYTH_TRIPLES = [[3,4,5],[5,12,13],[8,15,17],[7,24,25],[20,21,29],[9,40,41]];
const CIRCLE_VALUES = {
  sin:{0:0,30:0.5,45:Math.SQRT2/2,60:Math.sqrt(3)/2,90:1},
  cos:{0:1,30:Math.sqrt(3)/2,45:Math.SQRT2/2,60:0.5,90:0},
  tan:{0:0,30:Math.sqrt(3)/3,45:1,60:Math.sqrt(3)},
};
const CIRCLE_LABELS = {
  sin:{0:'0',30:'1/2',45:'√2/2',60:'√3/2',90:'1'},
  cos:{0:'1',30:'√3/2',45:'√2/2',60:'1/2',90:'0'},
  tan:{0:'0',30:'√3/3',45:'1',60:'√3'},
};

function triangleSVG(opp, adj, hyp){
  return `
<svg viewBox="0 0 260 220" width="180" height="152" style="display:block; margin:4px auto 0;">
  <polygon points="40,190 40,30 230,190" fill="none" stroke="var(--ink)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 40 190 L 58 190 L 58 172 L 40 172" fill="none" stroke="var(--ink)" stroke-width="3"/>
  <path d="M 40 30 L 40 56 A 26 26 0 0 1 60 47 Z" fill="var(--bad)" stroke="var(--bad)"/>
  <text x="16" y="115" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="var(--ink)" text-anchor="middle">${adj}</text>
  <text x="135" y="215" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="var(--ink)" text-anchor="middle">${opp}</text>
  <text x="150" y="100" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="var(--ink)" text-anchor="middle" transform="rotate(40 150 100)">${hyp}</text>
</svg>`;
}

/* ---------- генераторы темы «Задачи-ловушки» ---------- */

function randPick(arr){ return arr[randInt(0, arr.length-1)]; }
function round2(n){ return Math.round(n*100)/100; }
function fmtNum(n){ return parseFloat(n.toFixed(2)).toString(); }

function pluralRu(n, one, few, many){
  if(!Number.isInteger(n)) return few;
  const n100 = Math.abs(n) % 100;
  const n10 = n100 % 10;
  if(n100 >= 11 && n100 <= 14) return many;
  if(n10 === 1) return one;
  if(n10 >= 2 && n10 <= 4) return few;
  return many;
}
function nounForm(obj, n){ return pluralRu(n, obj.one, obj.few, obj.many); }

const PERIODS = {
  day:{one:'день', few:'дня', many:'дней', gender:'m'},
  minute:{one:'минута', few:'минуты', many:'минут', gender:'f'},
  hour:{one:'час', few:'часа', many:'часов', gender:'m'},
  week:{one:'неделя', few:'недели', many:'недель', gender:'f'},
};
function everyClauseFor(per, every){
  if(every === 1){
    if(per.gender === 'f'){
      const lastChar = per.one.slice(-1);
      const accForm = per.one.slice(0,-1) + (lastChar === 'я' ? 'ю' : 'у');
      return `каждую ${accForm}`;
    }
    return `каждый ${per.one}`;
  }
  return `каждые ${fmtNum(every)} ${nounForm(per,every)}`;
}

const RATE_CHOICES = [0.5, 1, 2, 0.25, 0.2, 0.1, 1.5, 2.5];

/* сюжеты вида «агенты × время → величина» (куры/яйца и варианты) */
const STORIES = [
  { subj:{one:'курица',few:'курицы',many:'куриц'}, unit:{one:'яйцо',few:'яйца',many:'яиц'},
    verbPast:'снесли', verbFuture:'снесут', verbInf:'снести', period:'day' },
  { subj:{one:'пчела',few:'пчелы',many:'пчёл'}, unit:{one:'кг мёда',few:'кг мёда',many:'кг мёда'},
    verbPast:'собрали', verbFuture:'соберут', verbInf:'собрать', period:'day' },
  { subj:{one:'корова',few:'коровы',many:'коров'}, unit:{one:'литр молока',few:'литра молока',many:'литров молока'},
    verbPast:'дали', verbFuture:'дадут', verbInf:'дать', period:'day' },
  { subj:{one:'станок',few:'станка',many:'станков'}, unit:{one:'деталь',few:'детали',many:'деталей'},
    verbPast:'сделали', verbFuture:'сделают', verbInf:'сделать', period:'minute' },
  { subj:{one:'пекарь',few:'пекаря',many:'пекарей'}, unit:{one:'буханка',few:'буханки',many:'буханок'},
    verbPast:'испекли', verbFuture:'испекут', verbInf:'испечь', period:'day' },
  { subj:{one:'насос',few:'насоса',many:'насосов'}, unit:{one:'литр воды',few:'литра воды',many:'литров воды'},
    verbPast:'откачали', verbFuture:'откачают', verbInf:'откачать', period:'minute' },
  { subj:{one:'мастерица',few:'мастерицы',many:'мастериц'}, unit:{one:'клубок',few:'клубка',many:'клубков'},
    verbPast:'спряли', verbFuture:'спрядут', verbInf:'спрясть', period:'day' },
  { subj:{one:'принтер',few:'принтера',many:'принтеров'}, unit:{one:'страница',few:'страницы',many:'страниц'},
    verbPast:'напечатали', verbFuture:'напечатают', verbInf:'напечатать', period:'minute' },
];

/* сюжеты вида «агенты × время = постоянный объём работы» (маляры/забор и варианты) */
const WORK_STORIES = [
  (aA,dA,aB,dB,per)=>{ const s={one:'маляр',few:'маляра',many:'маляров'};
    return `${fmtNum(aA)} ${nounForm(s,aA)} красят забор за ${dA} ${nounForm(per,dA)}. За сколько ${per.many} покрасят такой же забор ${fmtNum(aB)} ${nounForm(s,aB)} (при той же скорости на человека)?`; },
  (aA,dA,aB,dB,per)=>{ const s={one:'землекоп',few:'землекопа',many:'землекопов'};
    return `${fmtNum(aA)} ${nounForm(s,aA)} выкопали яму за ${dA} ${nounForm(per,dA)}. За сколько ${per.many} выкопают такую же яму ${fmtNum(aB)} ${nounForm(s,aB)}?`; },
  (aA,dA,aB,dB,per)=>{ const s={one:'уборщица',few:'уборщицы',many:'уборщиц'};
    return `${fmtNum(aA)} ${nounForm(s,aA)} убирают офис за ${dA} ${nounForm(per,dA)}. За сколько ${per.many} уберут такой же офис ${fmtNum(aB)} ${nounForm(s,aB)}?`; },
];

/* сюжеты на удвоение (лилии/бактерии/грибница/вирус) */
const GROWTH_STORIES = [
  { subject:'Лист кувшинки на пруду', growVerb:'удваивается', measure:'пруд', verb:'зарастёт', period:'day', every:1 },
  { subject:'Бактерии в банке', growVerb:'удваиваются', measure:'банка', verb:'заполнится', period:'minute', every:1 },
  { subject:'Грибница в лесу', growVerb:'удваивается', measure:'лес', verb:'покроется грибницей', period:'week', every:1 },
  { subject:'Количество клеток вируса в организме', growVerb:'удваивается', measure:'организм', verb:'заполнится', period:'hour', every:3 },
];

function genRateForward(){
  const story = randPick(STORIES);
  const per = PERIODS[story.period];
  const rate = randPick(RATE_CHOICES);
  const agentsA = Math.random()<0.35 ? randInt(2,9)+0.5 : randInt(2,12);
  const periodA = randInt(2,10);
  const qtyA = round2(agentsA*periodA*rate);
  const agentsB = randInt(2,14);
  const periodB = randInt(2,10);
  const qtyB = round2(agentsB*periodB*rate);

function isCleanDecimal(x, places){
  const scale = Math.pow(10, places);
  return Math.abs(Math.round(x*scale) - x*scale) < 1e-6;
}
const PIPE_CANDS = [1,1.5,2,2.5,3,4,5,6,8,9,10,12,15,16,18,20,24,30];

function genCombinedRates(){
  const per = PERIODS.hour;
  const mode = Math.random()<0.6 ? 'sum' : 'diff';
  if(mode === 'sum'){
    let T, tA, tBRaw;
    for(let tries=0; tries<60; tries++){
      T = randPick(PIPE_CANDS);
      tA = randPick(PIPE_CANDS);
      if(tA<=T) continue;
      tBRaw = 1/(1/T - 1/tA);
      if(tBRaw>0 && isCleanDecimal(tBRaw,2)) break;
    }
    const tB = round2(tBRaw);
    const display = `Труба А наполняет бассейн за ${fmtNum(tA)} ${nounForm(per,tA)}, труба Б — за ${fmtNum(tB)} ${nounForm(per,tB)}. За сколько часов бассейн наполнится, если открыть обе трубы одновременно?`;
    return { display, kind:'text', placeholder:'ответ в часах',
      check:(raw)=>{ const v=parseTrigAnswer(raw); return v!==null && Math.abs(v-T)<0.03; }, correctStr: fmtNum(T) };
  } else {
    let T, tDrain, tFillRaw;
    for(let tries=0; tries<60; tries++){
      T = randPick(PIPE_CANDS);
      tDrain = randPick(PIPE_CANDS);
      tFillRaw = 1/(1/T + 1/tDrain);
      if(isCleanDecimal(tFillRaw,2)) break;
    }
    const tFill = round2(tFillRaw);
    const display = `Труба наполняет бассейн за ${fmtNum(tFill)} ${nounForm(per,tFill)}, а сливное отверстие опустошает полный бассейн за ${fmtNum(tDrain)} ${nounForm(per,tDrain)}. Если открыть и трубу, и слив одновременно (бассейн пуст), за сколько часов он наполнится?`;
    return { display, kind:'text', placeholder:'ответ в часах',
      check:(raw)=>{ const v=parseTrigAnswer(raw); return v!==null && Math.abs(v-T)<0.03; }, correctStr: fmtNum(T) };
  }
}

function genNumbers(){
  if(Math.random()<0.5){
    const n=randInt(2,100); const ans=isPrime(n)?'prime':'composite';
    return { instr:'Это число простое или составное?', display:`${n}`, kind:'choice',
      choices:[{label:'Простое',value:'prime'},{label:'Составное',value:'composite'}],
      check:(v)=>v===ans, correctStr: ans==='prime'?'простое':'составное' };
  } else {
    let n; do{ n=randInt(4,100); } while(isPrime(n));
    const factors=primeFactorize(n);
    return { instr:'Разложи число на простые множители', display:`${n}`, kind:'text',
      placeholder:'напр. 2*3*3',
      check:(raw)=>{ const parts=raw.split(/[*xх×,]/i).map(s=>parseInt(s.trim(),10)).filter(x=>!isNaN(x));
        const product=parts.reduce((a,b)=>a*b,1); return parts.length>0 && parts.every(isPrime) && product===n; },
      correctStr: factors.join(' × ') };
  }
}

function genFractions(){
  if(Math.random()<0.5){
    let p,q; do{ p=randInt(1,6); q=randInt(2,9); } while(gcd(p,q)!==1);
    const k=randInt(2,5); const num=p*k, den=q*k;
    return { instr:'Сократи дробь до несократимого вида', display:fracHTML(num,den,false), kind:'text',
      placeholder:'напр. 2/3',
      check:(raw)=>{ const parsed=parseFracInput(raw); return parsed && parsed.n===p && parsed.d===q; },
      correctStr: q===1?`${p}`:`${p}/${q}` };
  } else {
    const ops=['+','-','×','÷']; const op=ops[randInt(0,3)];
    let a=randInt(1,8), b=randInt(2,10), c=randInt(1,8), d=randInt(2,10), rn, rd;
    if(op==='+'){ rn=a*d+c*b; rd=b*d; }
    else if(op==='-'){ if(a*d<c*b){[a,b,c,d]=[c,d,a,b];} rn=a*d-c*b; rd=b*d; }
    else if(op==='×'){ rn=a*c; rd=b*d; }
    else { rn=a*d; rd=b*c; }
    const reduced=reduceFrac(rn,rd);
    return { instr:'Выполни действие и запиши ответ в сокращённом виде',
      display: `${a}/${b} ${op} ${c}/${d}`,
      kind:'text', placeholder:'ответ',
      check:(raw)=>{ const parsed=parseFracInput(raw); return parsed && parsed.n===reduced.n && parsed.d===reduced.d; },
      correctStr: reduced.d===1?`${reduced.n}`:`${reduced.n}/${reduced.d}` };
  }
}

function genEquations(){
  if(Math.random()<0.5){
    let a; do{ a=randInt(-9,9); } while(a===0);
    const x0=randInt(-10,10), b=randInt(-15,15), c=a*x0+b;
    const bStr=b===0?'':(b>0?` + ${b}`:` − ${Math.abs(b)}`);
    const aStr=a===1?'x':(a===-1?'−x':`${a}x`);
    return { instr:'Найди x', display:`${aStr}${bStr} = ${c}`, kind:'text', placeholder:'напр. 5',
      check:(raw)=>{ const v=parseFloat(raw); return !isNaN(v) && Math.abs(v-x0)<0.001; }, correctStr:`${x0}` };
  } else {
    let a1,b1,a2,b2,det;
    do{
      a1=randInt(-9,9); if(a1===0)a1=1; b1=randInt(-9,9); if(b1===0)b1=1;
      a2=randInt(-9,9); if(a2===0)a2=1; b2=randInt(-9,9); if(b2===0)b2=1;
      det=a1*b2-a2*b1;
    } while(det===0);
    const x0=randInt(-9,9), y0=randInt(-9,9), c1=a1*x0+b1*y0, c2=a2*x0+b2*y0;
    function eqStr(a,b,c){
      const aStr=a===1?'x':(a===-1?'−x':`${a}x`); const bAbs=Math.abs(b);
      const bStr=b===0?'':(b>0?` + ${b===1?'':b}y`:` − ${bAbs===1?'':bAbs}y`);
      return `${aStr}${bStr} = ${c}`;
    }
    return { instr:'Реши систему: найди x и y', display:`${eqStr(a1,b1,c1)}<br>${eqStr(a2,b2,c2)}`,
      kind:'text', placeholder:'напр. 2;-3',
      check:(raw)=>{ const nums=raw.match(/-?\d+(\.\d+)?/g); if(!nums||nums.length<2) return false;
        const x=parseFloat(nums[0]), y=parseFloat(nums[1]); return Math.abs(x-x0)<0.001 && Math.abs(y-y0)<0.001; },
      correctStr:`x=${x0}; y=${y0}` };
  }
}

function genTrig(){
  if(Math.random()<0.5){
    const [l1,l2,hypBase]=PYTH_TRIPLES[randInt(0,PYTH_TRIPLES.length-1)];
    const k=randInt(1,3); const opp=l1*k, adj=l2*k, hyp=hypBase*k;

    const reduced=reduceFrac(num,den);
    return { instr:'Найди отношение сторон',
      display: triangleSVG(opp, adj, hyp) + `<div style="margin-top:8px; font-size:20px; font-weight:700;">Найди ${label}</div>`,
      kind:'text', placeholder:'напр. 3/5',
      check:(raw)=>{ const parsed=parseFracInput(raw); return parsed && parsed.n===reduced.n && parsed.d===reduced.d; },
      correctStr: reduced.d===1?`${reduced.n}`:`${reduced.n}/${reduced.d}` };
  } else {
    const func=['sin','cos','tan'][randInt(0,2)];

const timeLeft0 = 600;
let timeLeft = timeLeft0;
let timerId = null;
let currentProblem = null;
const stats = { correct:0, total:0 };

const trainingView = document.getElementById('trainingView');
const resultsView = document.getElementById('resultsView');
const timerEl = document.getElementById('timerVal');
const scoreEl = document.getElementById('scoreVal');
const questionEl = document.getElementById('questionEl');
const choiceControls = document.getElementById('choiceControls');
const textControls = document.getElementById('textControls');
const answerInput = document.getElementById('answerInput');
const hintEl = document.getElementById('hintEl');
const readoutEl = document.getElementById('readout');
const keypadExtra = document.getElementById('keypadExtra');
const keypad = document.getElementById('keypad');

function renderTimer(){
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  timerEl.textContent = m + ':' + (s<10?'0':'') + s;
  timerEl.classList.toggle('timer-warn', timeLeft <= 10);
}
function renderScore(){ scoreEl.textContent = stats.correct + '/' + stats.total; }

const EXTRA_KEYS = ["*","/","-",";","√2","√3"];
function buildKeypad(){
  keypadExtra.style.display = 'grid';
  keypadExtra.style.gridTemplateColumns = 'repeat(3, 1fr)';
  keypadExtra.style.gap = '8px';
  keypadExtra.innerHTML = '';
  EXTRA_KEYS.forEach(k=>{
    const b = document.createElement('button');
    b.textContent = k; b.dataset.k = k;
    keypadExtra.appendChild(b);
  });
}
buildKeypad();

function pressKey(k){
  if(!currentProblem) return;
  if(k === 'back'){ answerInput.value = answerInput.value.slice(0,-1); }
  else { answerInput.value += k; }
}
keypad.addEventListener('click', e=>{
  const btn = e.target.closest('button[data-k]');
  if(btn) pressKey(btn.dataset.k);
});
keypadExtra.addEventListener('click', e=>{
  const btn = e.target.closest('button[data-k]');
  if(btn) pressKey(btn.dataset.k);
});

function nextProblem(){
  const problem = genProblem();
  currentProblem = problem;
  questionEl.classList.toggle('prose', !!problem.prose);
  questionEl.innerHTML = problem.display;
  hintEl.textContent = problem.hint || '';
  readoutEl.classList.remove('flash-good','flash-bad');

  if(problem.kind === 'choice'){
    choiceControls.style.display = 'flex'; textControls.style.display = 'none';
    choiceControls.innerHTML = '';
    problem.choices.forEach(c=>{
      const btn = document.createElement('button');
      btn.className = 'cta secondary'; btn.textContent = c.label;
      btn.addEventListener('click', ()=> submitAnswer(c.value, btn));
      choiceControls.appendChild(btn);
    });
  } else {
    choiceControls.style.display = 'none'; textControls.style.display = 'block';
    answerInput.value = ''; answerInput.placeholder = problem.placeholder || 'ответ';
    answerInput.focus();
  }
}

function submitAnswer(rawOrValue, btnEl){
  if(!currentProblem) return;
  const correct = currentProblem.check(rawOrValue);
  stats.total++;
  if(correct) stats.correct++;
  renderScore();
  if(btnEl){ btnEl.classList.add(correct ? 'flash-good' : 'flash-bad'); }
  else { readoutEl.classList.add(correct ? 'flash-good' : 'flash-bad'); }
  currentProblem = null;
  setTimeout(()=>{ if(timeLeft > 0) nextProblem(); }, 500);
}

document.getElementById('checkBtn').addEventListener('click', ()=>{
  const raw = answerInput.value.trim();
  if(!raw || !currentProblem) return;
  submitAnswer(raw);
});
answerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('checkBtn').click(); });
window.addEventListener('keydown', e=>{
  if(!trainingView || trainingView.style.display === 'none') return;
  if(document.activeElement === answerInput) return;
  if(e.key >= '0' && e.key <= '9') pressKey(e.key);
});

function finish(early){
  if(timerId){ clearInterval(timerId); timerId = null; }
  trainingView.style.display = 'none';
  resultsView.style.display = 'flex';

  const acc = stats.total > 0 ? Math.round(stats.correct/stats.total*100) : 0;
  const correctThreshold = Math.round(77 * 0.9);
  const accGood = acc > 90;
  const countGood = stats.correct > correctThreshold;

  const resultBigEl = document.getElementById('resultBig');
  const resultAccEl = document.getElementById('resultAcc');
  resultBigEl.textContent = stats.correct + ' / ' + stats.total;
  resultAccEl.textContent = 'Точность: ' + acc + '%';
  resultBigEl.style.color = countGood ? 'var(--good)' : 'var(--bad)';
  resultAccEl.style.color = accGood ? 'var(--good)' : 'var(--bad)';

  const badge = document.getElementById('endBadge');
  const title = document.getElementById('endTitle');
  const sub = document.getElementById('endSub');
  const passed = countGood && accGood;

  if(early){
    badge.className = 'end-badge lose'; badge.textContent = '●';
    title.textContent = 'Экзамен прерван';
    sub.textContent = 'Попытка засчитывается только за полные 10 минут — попробуй снова.';
  } else if(passed){
    badge.className = 'end-badge win'; badge.textContent = '★';
    title.textContent = 'Экзамен сдан!';
    sub.textContent = 'Ты уверенно справляешься со всеми темами.';
  } else {
    badge.className = 'end-badge lose'; badge.textContent = '●';
    title.textContent = 'Время вышло';
    sub.textContent = 'Потренируйся ещё по отдельным темам и попробуй снова.';
  }

}

document.getElementById('exitBtn').addEventListener('click', ()=> finish(true));
document.getElementById('retryBtn').addEventListener('click', ()=> window.location.reload());

trainingView.style.display = 'flex';
renderTimer();
renderScore();
nextProblem();
timerId = setInterval(()=>{
  timeLeft--;
  renderTimer();
  if(timeLeft <= 0) finish();
}, 1000);

</script>
<script>
(function(){
  var canvas = document.getElementById('stars');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var stars = [];
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function resize(){
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    var count = Math.round((window.innerWidth*window.innerHeight)/3800);
    stars = [];
    for(var i=0;i<count;i++){
      stars.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
        r:Math.random()*1.3+0.3, phase:Math.random()*Math.PI*2, speed:0.4+Math.random()*0.8 });
    }
  }
  window.addEventListener('resize', resize);
  resize();
  function draw(t){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(var i=0;i<stars.length;i++){
      var s = stars[i];
      var tw = reduceMotion ? 0.85 : 0.55 + 0.45*Math.sin(t*0.001*s.speed + s.phase);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(243,241,255,' + (tw*0.9).toFixed(3) + ')';
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
  }
  var startT = null;
  function loop(t){ if(startT===null) startT=t; draw(t-startT); if(!reduceMotion) requestAnimationFrame(loop); }
  if(reduceMotion){ draw(0); } else { requestAnimationFrame(loop); }
})();
</script>
