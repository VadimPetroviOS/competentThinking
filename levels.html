<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A1C">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Тренажёр по математике</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  :root {
    --void: #0A0A1C;
    --void-2: #150F30;
    --nebula: #3A2166;
    --panel: rgba(20, 16, 42, 0.6);
    --panel-solid: #171233;
    --line: rgba(255,255,255,.12);
    --ink: #F3F1FF;
    --muted: #A79FC9;
    --accent: #FFB454;
    --accent-ink: #3D2400;
    --good: #6FDFA6;
    --good-bg: rgba(111,223,166,.14);
    --bad: #FF6E7A;
    --bad-bg: rgba(255,110,122,.16);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    background: var(--void);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }
  #stars { position: fixed; inset: 0; z-index: 0; display: block; }
  .nebula {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(38% 30% at 18% 22%, rgba(122,90,220,.35), transparent 60%),
      radial-gradient(45% 35% at 82% 78%, rgba(255,140,90,.14), transparent 60%),
      radial-gradient(30% 25% at 75% 15%, rgba(90,170,220,.20), transparent 60%),
      linear-gradient(180deg, var(--void) 0%, var(--void-2) 55%, var(--void) 100%);
    filter: blur(2px);
  }
  .stage {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 28px 16px;
  }
  .panel {
    width: 100%; max-width: 460px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 22px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 30px 60px -25px rgba(0,0,0,.7);
    padding: 26px 22px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  h1.title {
    font-family: "Century Gothic", "Futura", "Trebuchet MS", ui-sans-serif, sans-serif;
    text-align: center; text-transform: uppercase; letter-spacing: .04em;
    font-size: 18px; margin: 0 0 4px; color: var(--ink);
  }
  h1.title span { color: var(--accent); }
  .subtitle { text-align: center; font-size: 12px; color: var(--muted); margin: -8px 0 4px; }

  .cta {
    font: inherit; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    font-size: 15px; color: var(--accent-ink);
    background: linear-gradient(180deg, #FFD98E, var(--accent));
    border: none; border-radius: 14px; padding: 15px 18px; cursor: pointer;
    box-shadow: 0 10px 24px -10px rgba(255,180,84,.6), 0 1px 0 rgba(255,255,255,.4) inset;
    transition: transform .1s ease, box-shadow .1s ease;
  }
  .cta:hover { transform: translateY(-1px); }
  .cta:active { transform: translateY(0px) scale(.99); }
  .cta.secondary {
    background: rgba(255,255,255,.06); color: var(--ink); box-shadow: none;
    border: 1px solid var(--line); text-decoration: none; text-align: center; display: block;
  }
  .cta.danger { background: var(--bad-bg); color: var(--bad); box-shadow: none; border: 1px solid var(--bad); }

  .hud { display: flex; justify-content: space-between; align-items: flex-end; }
  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-block.right { align-items: flex-end; }
  .hud-label { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .hud-value {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .hud-value.timer-warn { color: var(--bad); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

  .topic-badge {
    text-align: center; font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin: 0;
  }
  .question {
    text-align: center; font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: 26px; font-weight: 600; color: var(--ink); line-height: 1.5; margin: 4px 0;
  }
  .instr { text-align: center; font-size: 12.5px; color: var(--muted); margin: -6px 0 2px; }

  .choice-row { display: flex; flex-direction: column; gap: 10px; }

  .readout {
    position: relative;
    background: rgba(0,0,0,.35); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 16px; text-align: center;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .readout input {
    width: 100%; background: transparent; border: none; outline: none;
    font-family: inherit; font-size: 22px; font-weight: 600; color: var(--ink);
    text-align: center;
  }
  .readout input::placeholder { color: var(--muted); }
  .readout.flash-good { border-color: var(--good); box-shadow: 0 0 0 3px var(--good-bg); }
  .readout.flash-bad { border-color: var(--bad); box-shadow: 0 0 0 3px var(--bad-bg); }
  .cta.secondary.flash-good { border-color: var(--good); background: var(--good-bg); color: var(--good); }
  .cta.secondary.flash-bad { border-color: var(--bad); background: var(--bad-bg); color: var(--bad); }

  .hint { text-align: center; font-size: 11px; color: var(--muted); margin: 0; }

  .feedback {
    min-height: 20px; text-align: center; font-size: 13.5px; font-weight: 700; letter-spacing: .02em;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  .keypad-extra { display: flex; gap: 8px; }
  .keypad-extra button {
    flex: 1; font-family: ui-monospace, "SF Mono", monospace; font-size: 16px; font-weight: 600;
    color: var(--muted); background: rgba(255,255,255,.04); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 0; cursor: pointer;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .keypad-extra button:hover { background: rgba(255,255,255,.09); color: var(--ink); }
  .keypad-extra button:active { transform: scale(.96); }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .keypad button {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 19px; font-weight: 600;
    color: var(--ink); background: rgba(255,255,255,.05); border: 1px solid var(--line);
    border-radius: 12px; padding: 13px 0; cursor: pointer;
    transition: background .1s ease, transform .05s ease;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .keypad button:hover { background: rgba(255,255,255,.1); }
  .keypad button:active { transform: scale(.96); }

  .end-badge {
    width: 60px; height: 60px; margin: 4px auto 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 24px; font-weight: 700;
  }
  .end-badge.win { background: var(--good-bg); color: var(--good); box-shadow: 0 0 0 8px rgba(111,223,166,.06); }
  .end-badge.lose { background: rgba(255,255,255,.06); color: var(--accent); box-shadow: 0 0 0 8px rgba(255,180,84,.06); }
  .end-title {
    text-align: center; font-family: "Century Gothic","Futura","Trebuchet MS",ui-sans-serif,sans-serif;
    text-transform: uppercase; letter-spacing: .03em; font-size: 20px; font-weight: 700; margin: 0;
  }
  .end-sub { text-align: center; color: var(--muted); font-size: 13px; margin: -4px 0 0; line-height: 1.5; }
  .stat-row { display: flex; justify-content: space-around; padding-top: 4px; }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .stat-value { font-family: ui-monospace, monospace; font-size: 20px; font-weight: 700; color: var(--ink); }

  /* --- settings-specific --- */
  .op-grid, .topic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (max-width: 380px) { .op-grid, .topic-grid { grid-template-columns: 1fr; } }
  .chip {
    display: flex; align-items: center; gap: 8px; padding: 11px 12px;
    border: 1px solid var(--line); border-radius: 12px; cursor: pointer; font-size: 13px;
    color: var(--ink); background: rgba(255,255,255,.03);
    user-select: none; transition: border-color .1s ease, background .1s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.checked { border-color: var(--accent); background: rgba(255,180,84,.1); }
  .chip input { accent-color: var(--accent); width: 15px; height: 15px; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .range-ticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .settings-label { font-size: 12.5px; font-weight: 700; color: var(--ink); letter-spacing: .02em; }
  .settings-error { color: var(--bad); font-size: 12px; text-align: center; min-height: 16px; }
  .preview-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .preview-chip {
    font-family: ui-monospace, monospace; font-size: 13.5px; font-weight: 600; color: var(--ink);
    background: rgba(0,0,0,.3); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
  }
  .back-link { text-align: center; font-size: 11.5px; color: var(--muted); text-decoration: none; display: block; }
  .back-link:hover { color: var(--ink); }

  .levels-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .levels-title{ text-align:center; }
  .levels-svg{ display:block; margin:10px auto 0; touch-action:none; overflow:visible; opacity:0; transition: opacity .25s ease; }
  .levels-svg.ready{ opacity:1; }
  .level-node{ cursor:default; }
  .level-node.unlocked{ cursor:pointer; }
  .level-node circle.ring{ transition: filter .15s ease, transform .1s ease; transform-box: fill-box; transform-origin: center; }
  .level-node.unlocked:hover circle.ring{ filter: brightness(1.15); transform: scale(1.05); }
  .level-node text{ font-family: ui-monospace, monospace; font-weight:700; pointer-events:none; user-select:none; }
  .level-node .node-label{ font-family: -apple-system, "Segoe UI", sans-serif; font-weight:600; pointer-events:none; user-select:none; }
  .level-node.unlocked .node-label{ fill: var(--ink); }
  .level-node .halo{ transform-box: fill-box; transform-origin: center; animation: haloPulse 2.4s ease-out infinite; pointer-events:none; }
  @keyframes haloPulse{ 0%{ transform:scale(1); opacity:.55; } 100%{ transform:scale(1.7); opacity:0; } }
  .progress-line{ text-align:center; font-size:11.5px; color:var(--muted); margin-top:-4px; }
  .progress-line b{ color:var(--accent); }

  .panel.levels-panel{ animation: panelIn .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes panelIn{ from{ opacity:0; transform:translateY(14px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
</style>
</head>
<body>
<canvas id="stars"></canvas><div class="nebula"></div>
<div class="stage">
  <div class="panel levels-panel" style="max-width:360px;">
    <h1 class="title">Карта <span>уровней</span></h1>
    <p class="subtitle">Проходи уровни по порядку — новые открываются постепенно</p>

    <div class="levels-wrap">
      <svg class="levels-svg" viewBox="0 0 300 500" width="260" height="433">
        <line id="line12" x1="127.7" y1="438.3" x2="182.3" y2="371.7" stroke="var(--line)" stroke-width="3"/>
        <line x1="183.2" y1="327.6" x2="126.8" y2="252.4" stroke="var(--line)" stroke-width="3"/>
        <line x1="117.7" y1="203.1" x2="142.3" y2="116.9"  stroke="var(--line)" stroke-width="3"/>

        <g class="level-node unlocked" data-level="1" data-href="math.html">
          <circle class="halo" cx="110" cy="460" r="26" fill="none" stroke="var(--accent)" stroke-width="2"/>
          <circle class="ring" cx="110" cy="460" r="26" fill="var(--accent)" stroke="var(--accent-ink)" stroke-width="2"/>
          <text x="110" y="467" font-size="20" text-anchor="middle" fill="var(--accent-ink)">1</text>
        </g>

        <g id="level2-locked" class="level-node" data-level="2">
          <circle class="ring" cx="200" cy="350" r="24" fill="rgba(255,255,255,.08)" stroke="var(--muted)" stroke-width="2"/>
          <path d="M 191 346 v -6 a 9 9 0 0 1 18 0 v 6" fill="none" stroke="var(--muted)" stroke-width="2.2"/>
          <rect x="189" y="345" width="22" height="16" rx="3" fill="var(--muted)" opacity="0.9"/>
        </g>

        <g id="level2-unlocked" class="level-node unlocked" data-level="2" data-href="price-trainer.html" style="display:none;">
          <circle class="halo" cx="200" cy="350" r="26" fill="none" stroke="var(--accent)" stroke-width="2"/>
          <circle class="ring" cx="200" cy="350" r="26" fill="var(--accent)" stroke="var(--accent-ink)" stroke-width="2"/>
          <text x="200" y="357" font-size="20" text-anchor="middle" fill="var(--accent-ink)">2</text>
        </g>

        <g class="level-node" data-level="3">
          <circle class="ring" cx="110" cy="230" r="24" fill="rgba(255,255,255,.08)" stroke="var(--muted)" stroke-width="2"/>
          <text x="110" y="237" font-size="18" text-anchor="middle" fill="var(--muted)">3</text>
          <text class="node-label" x="146" y="237" font-size="13" text-anchor="start" fill="var(--muted)">Скоро</text>
        </g>

        <g class="level-node" data-level="4">
          <circle class="ring" cx="150" cy="90" r="24" fill="rgba(255,255,255,.08)" stroke="var(--muted)" stroke-width="2"/>
          <text x="150" y="97" font-size="18" text-anchor="middle" fill="var(--muted)">4</text>
          <text class="node-label" x="186" y="97" font-size="13" text-anchor="start" fill="var(--muted)">Скоро</text>
        </g>
      </svg>
    </div>

    <div style="display:flex; gap:10px; margin-top:4px;">
      <a class="cta secondary" href="leaderboard.html" style="flex:1; text-align:center;">🏆 Лидеры</a>
      <button class="cta secondary" id="logoutBtn" style="flex:1;">Выйти</button>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.level-node').forEach(node=>{
  node.addEventListener('click', ()=>{
    const href = node.getAttribute('data-href');
    if(href) window.location.href = href;
  });
});

document.getElementById('logoutBtn').addEventListener('click', sbLogout);

(async function init(){
  const session = await sbGetSession();
  if(!session){ window.location.href = 'login.html'; return; }

  try{
    const { data, error } = await window.sb.rpc('get_access_status');
    if(error) throw error;
    const status = Array.isArray(data) ? data[0] : data;
    const level2Unlocked = status ? status.level2_unlocked : false;

    if(level2Unlocked){
      document.getElementById('level2-locked').style.display = 'none';
      document.getElementById('level2-unlocked').style.display = '';
      document.getElementById('line12').setAttribute('stroke', 'var(--accent)');
      document.getElementById('line12').setAttribute('opacity', '0.55');
    }
  } catch(e){ console.error('get_access_status failed', e); }

  document.querySelector('.levels-svg').classList.add('ready');
})();
</script>
<script>
(function(){
  var canvas = document.getElementById('stars');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var stars = [];
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function resize(){
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    var count = Math.round((window.innerWidth*window.innerHeight)/3800);
    stars = [];
    for(var i=0;i<count;i++){
      stars.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
        r:Math.random()*1.3+0.3, phase:Math.random()*Math.PI*2, speed:0.4+Math.random()*0.8 });
    }
  }
  window.addEventListener('resize', resize);
  resize();
  function draw(t){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for(var i=0;i<stars.length;i++){
      var s = stars[i];
      var tw = reduceMotion ? 0.85 : 0.55 + 0.45*Math.sin(t*0.001*s.speed + s.phase);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(243,241,255,' + (tw*0.9).toFixed(3) + ')';
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
  }
  var startT = null;
  function loop(t){ if(startT===null) startT=t; draw(t-startT); if(!reduceMotion) requestAnimationFrame(loop); }
  if(reduceMotion){ draw(0); } else { requestAnimationFrame(loop); }
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
